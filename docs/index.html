<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>お部屋の温湿度</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>お部屋の温湿度</h1>
    <p id="last-updated" class="last-updated">読み込み中...</p>
  </header>

  <main>
    <section class="current-values">
      <div class="card temperature">
        <span class="label">気温</span>
        <span id="current-temperature" class="value">--</span>
        <span class="unit">&deg;C</span>
      </div>
      <div class="card humidity">
        <span class="label">湿度</span>
        <span id="current-humidity" class="value">--</span>
        <span class="unit">%</span>
      </div>
      <div class="card battery">
        <span class="label">電池残量</span>
        <span id="current-battery" class="value">--</span>
        <span class="unit">%</span>
      </div>
    </section>

    <section class="chart-section">
      <div class="range-buttons">
        <button type="button" data-range="24h" class="active">24時間</button>
        <button type="button" data-range="7d">7日間</button>
        <button type="button" data-range="30d">30日間</button>
      </div>
      <canvas id="sensor-chart" height="300"></canvas>
    </section>
  </main>

  <footer>
    <p>Data source: SwitchBot API / Powered by GitHub Actions &amp; GitHub Pages</p>
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"
    integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
    crossorigin="anonymous"></script>
  <script
    src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"
    integrity="sha384-cVMg8E3QFwTvGCDuK+ET4PD341jF3W8nO1auiXfuZNQkzbUUiBGLsIQUE+b1mxws"
    crossorigin="anonymous"></script>
  <script src="js/app.js"></script>
</body>
</html>
